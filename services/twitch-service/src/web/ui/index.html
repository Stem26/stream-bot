<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Twitch бот</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
    body.page-admin{background:url(/assets/fon.png) center/cover no-repeat fixed;min-height:100vh;padding:20px}
    body.page-public{min-height:100vh;padding:0;position:relative;background:url(/assets/fon.png) center/cover no-repeat fixed}
    body.page-public-duel,body.page-public-links{min-height:100vh;padding:0;position:relative;background:url(/assets/fon.png) center/cover no-repeat fixed}
    body.page-public #app,body.page-public-duel #app,body.page-public-links #app{position:relative;z-index:1}
    body.page-public::after,body.page-public-duel::after,body.page-public-links::after{content:'';position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:0;pointer-events:none}
    .btn-back-fixed{position:fixed;top:20px;right:20px;z-index:1001;background:rgba(255,255,255,.25);color:white;border:2px solid rgba(255,255,255,.9);padding:10px 20px;border-radius:8px;text-decoration:none}
  </style>
</head>
<body>
<div id="app"></div>
<script type="module" src="/src/spa-entry.ts"></script>
</body>
</html>

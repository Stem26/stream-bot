<div class="counters-table-wrap">
  <div class="counters-table-card">
    <div class="counters-table-header">
      <button type="button" class="btn btn-small" id="add-counter-btn">Добавить счётчик</button>
    </div>
    <div id="counters-container" class="counters-table-container loading-state">
      <div class="loading">Загрузка счётчиков...</div>
      <table class="counters-table" id="counters-table" style="display: none;">
        <thead>
        <tr>
          <th class="col-num">№</th>
          <th class="col-trigger">Триггер</th>
          <th class="col-access">Доступ</th>
          <th class="col-value">Знач.</th>
          <th class="col-description">Шаблон</th>
          <th class="col-status">Статус</th>
          <th class="col-actions">Действия</th>
        </tr>
        </thead>
        <tbody id="counters-tbody"></tbody>
      </table>
    </div>
  </div>
</div>
<template id="template-counter-row">
  <tr class="counter-table-row" data-id="">
    <td class="col-num"></td>
    <td class="col-trigger"><span class="trigger-text"></span></td>
    <td class="col-access"><span class="access-text"></span></td>
    <td class="col-value"></td>
    <td class="col-description"></td>
    <td class="col-status">
      <button type="button" class="status-badge" data-action="toggle"></button>
    </td>
    <td class="col-actions">
      <button type="button" class="btn-icon" data-action="edit" title="Настройки">⚙️</button>
    </td>
  </tr>
</template>
<div class="empty-state" id="counters-empty-state">
  <h3>Счётчики не найдены</h3>
  <p>Создайте счётчик, нажав на кнопку выше</p>
</div>

<div class="commands-table-wrap">
  <div class="commands-table-card">
    <div class="commands-table-header">
      <button type="button" class="btn btn-small" id="add-command-btn">Добавить команду</button>
    </div>
    <div id="commands-container" class="commands-table-container loading-state">
      <div class="loading">Загрузка команд...</div>
      <table class="commands-table" id="commands-table" style="display: none;">
        <thead>
        <tr>
          <th class="col-num">№</th>
          <th class="col-trigger">Триггер</th>
          <th class="col-response">Ответ</th>
          <th class="col-status">Статус</th>
          <th class="col-rotation">Ротация</th>
          <th class="col-actions">Действия</th>
        </tr>
        </thead>
        <tbody id="commands-tbody"></tbody>
      </table>
    </div>
  </div>
</div>
<template id="template-command-row">
  <tr class="command-table-row">
    <td class="col-num"></td>
    <td class="col-trigger"><span class="trigger-text"></span></td>
    <td class="col-response"></td>
    <td class="col-status">
      <button type="button" class="status-badge" data-action="toggle"></button>
    </td>
    <td class="col-rotation">
      <button type="button" class="status-badge rotation-badge" data-action="toggle-rotation"></button>
    </td>
    <td class="col-actions">
      <button type="button" class="btn-icon" data-action="send" title="В чат">🚀</button>
    </td>
  </tr>
</template>
<div class="empty-state" id="empty-state">
  <h3>Команды не найдены</h3>
  <p>Создайте свою первую команду, нажав на кнопку выше</p>
</div>
